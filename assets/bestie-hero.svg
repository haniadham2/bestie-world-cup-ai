<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Bestie — animated World Cup companion mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6C7FF"/>
      <stop offset="55%" stop-color="#A8D8FF"/>
      <stop offset="100%" stop-color="#B8F2D8"/>
    </linearGradient>
    <radialGradient id="body" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#FFE989"/>
      <stop offset="58%" stop-color="#FFD23F"/>
      <stop offset="100%" stop-color="#FFC525"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC9E6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#D6C7FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D6C7FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" rx="28" fill="url(#bg)"/>

  <!-- Tagline -->
  <text x="320" y="52" text-anchor="middle" font-family="Nunito, Verdana, sans-serif" font-size="30" font-weight="800" fill="#3A3258">Watch the World Cup with Bestie</text>
  <text x="320" y="80" text-anchor="middle" font-family="Nunito, Verdana, sans-serif" font-size="16" font-weight="700" fill="#3A3258" opacity="0.65">Tap any moment — Bestie explains it.</text>

  <!-- Twinkles -->
  <g fill="#FFF3B0">
    <path d="M120 120 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 z">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M520 130 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 z">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M150 280 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 z">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/>
    </path>
    <path d="M500 275 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 z">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Drifting mini football -->
  <g opacity="0.5">
    <g transform="translate(70 210)">
      <animateTransform attributeName="transform" type="translate" values="70 210; 70 190; 70 210" dur="6s" repeatCount="indefinite" additive="sum"/>
      <circle r="14" fill="#fff" stroke="#3A3258" stroke-width="1.5"/>
      <path d="M0 -6 l4.5 3.3 -1.7 5.4 h-5.6 l-1.7 -5.4 z" fill="#3A3258"/>
    </g>
  </g>

  <!-- Bestie (floats up and down) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -12; 0 0" dur="3s" repeatCount="indefinite"/>

    <!-- soft glow -->
    <circle cx="320" cy="235" r="110" fill="url(#glow)">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- feet -->
    <g stroke="#FF9F1C" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M300 300 l-10 10 M300 300 l0 13 M300 300 l10 10"/>
      <path d="M340 300 l-10 10 M340 300 l0 13 M340 300 l10 10"/>
    </g>

    <!-- wings (gentle flap via rotate around shoulder) -->
    <ellipse cx="246" cy="238" rx="18" ry="30" fill="#FFC123">
      <animateTransform attributeName="transform" type="rotate" values="0 258 214; -16 258 214; 0 258 214" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="394" cy="238" rx="18" ry="30" fill="#FFC123">
      <animateTransform attributeName="transform" type="rotate" values="0 382 214; 16 382 214; 0 382 214" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- body (breathes: ry pulses) -->
    <ellipse cx="320" cy="232" rx="72" fill="url(#body)">
      <animate attributeName="ry" values="74;77;74" dur="3.2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="320" cy="252" rx="46" ry="46" fill="#FFE9A8" opacity="0.45"/>

    <!-- head group (gentle tilt) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 320 285; -4 320 285; 0 320 285; 4 320 285; 0 320 285" dur="8s" repeatCount="indefinite"/>

      <!-- tuft -->
      <g fill="#FFC123">
        <path d="M320 168 q-8 -16 -2 -25 q7 7 7 18 z"/>
        <path d="M320 168 q8 -15 15 -18 q-1 10 -9 20 z"/>
      </g>

      <!-- cheeks -->
      <circle cx="278" cy="250" r="11" fill="#FF9EC4" opacity="0.75"/>
      <circle cx="362" cy="250" r="11" fill="#FF9EC4" opacity="0.75"/>

      <!-- left eye -->
      <g>
        <ellipse cx="300" cy="216" rx="15" fill="#fff">
          <animate attributeName="ry" values="17;17;17;3;17" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </ellipse>
        <circle cx="300" cy="216" r="8" fill="#3A3258">
          <animate attributeName="r" values="8;8;8;1;8" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="297" cy="212" r="2.8" fill="#fff">
          <animate attributeName="opacity" values="1;1;1;0;1" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- right eye -->
      <g>
        <ellipse cx="340" cy="216" rx="15" fill="#fff">
          <animate attributeName="ry" values="17;17;17;3;17" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </ellipse>
        <circle cx="340" cy="216" r="8" fill="#3A3258">
          <animate attributeName="r" values="8;8;8;1;8" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="337" cy="212" r="2.8" fill="#fff">
          <animate attributeName="opacity" values="1;1;1;0;1" keyTimes="0;0.82;0.9;0.94;1" dur="4.5s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- beak + friendly smile -->
      <path d="M309 238 L331 238 L320 254 Z" fill="#FF9F1C"/>
      <path d="M311 258 Q320 266 329 258" stroke="#6B2737" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
    </g>
  </g>
</svg>

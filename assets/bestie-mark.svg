<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Bestie mascot">
  <defs>
    <radialGradient id="m-body" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#FFE989"/>
      <stop offset="58%" stop-color="#FFD23F"/>
      <stop offset="100%" stop-color="#FFC525"/>
    </radialGradient>
  </defs>

  <!-- feet -->
  <g stroke="#FF9F1C" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M50 104 l-6 6 M50 104 l0 8 M50 104 l6 6"/>
    <path d="M70 104 l-6 6 M70 104 l0 8 M70 104 l6 6"/>
  </g>

  <!-- wings -->
  <ellipse cx="24" cy="74" rx="10" ry="17" fill="#FFC123"/>
  <ellipse cx="96" cy="74" rx="10" ry="17" fill="#FFC123"/>

  <!-- body -->
  <ellipse cx="60" cy="70" rx="40" ry="42" fill="url(#m-body)"/>
  <ellipse cx="60" cy="80" rx="26" ry="26" fill="#FFE9A8" opacity="0.45"/>

  <!-- tuft -->
  <g fill="#FFC123">
    <path d="M60 32 q-5 -10 -1 -16 q4 4 4 11 z"/>
    <path d="M60 32 q5 -9 9 -11 q-1 6 -5 12 z"/>
  </g>

  <!-- cheeks -->
  <circle cx="37" cy="76" r="6.5" fill="#FF9EC4" opacity="0.75"/>
  <circle cx="83" cy="76" r="6.5" fill="#FF9EC4" opacity="0.75"/>

  <!-- eyes -->
  <g>
    <ellipse cx="48" cy="64" rx="9" ry="10.5" fill="#fff"/>
    <circle cx="48" cy="64" r="5.2" fill="#3A3258"/>
    <circle cx="46" cy="62" r="1.9" fill="#fff"/>
  </g>
  <g>
    <ellipse cx="72" cy="64" rx="9" ry="10.5" fill="#fff"/>
    <circle cx="72" cy="64" r="5.2" fill="#3A3258"/>
    <circle cx="70" cy="62" r="1.9" fill="#fff"/>
  </g>

  <!-- beak + friendly smile -->
  <path d="M53 76 L67 76 L60 86 Z" fill="#FF9F1C"/>
  <path d="M54 89 Q60 95 66 89" stroke="#6B2737" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.85"/>
</svg>
